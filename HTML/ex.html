<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .box{
            background-color: aqua;
            position: relative;
            height: 200px;
            width: 200px;
            border-radius:50px ;
            transition: all 1s ;
            animation: akash ease-in-out 2s infinite;

        }
        @keyframes akash{
            form{
                background-color: aqua;
            }
            to{
                transform: translate(200px);
                transform: rotate(360deg);
                background-color: red;
            }
        }
        .box:hover{
            transform: scale(2);
            /* transition: all 1s 1s ; */
        }
    </style>
</head>
<body>
    <div class="box"></div>
</body>
</html>
